name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy, well-formed Clerk keys so `next build` can prerender under ClerkProvider.
      # Real keys live in Railway/CI secrets; these are inert placeholders.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ci0000000000000000000000000000000000
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # Includes the api testcontainers integration journey (ingest → transcript →
        # structuring → routes) — GitHub's runner provides a Docker daemon.
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ci0000000000000000000000000000000000
      WEB_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @recall/web exec playwright install --with-deps chromium
      - name: Build web
        run: pnpm --filter @recall/web build
      - name: Start web
        run: pnpm --filter @recall/web start &
      - name: Wait for web
        run: npx --yes wait-on http://localhost:3000/sign-in
      - name: Playwright journey
        run: pnpm --filter @recall/web test:e2e
